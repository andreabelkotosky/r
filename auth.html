<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowOPS - Autenticación</title>
    <!-- Incluir fuente Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <!-- Archivo CSS principal (contiene base y variables) -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="auth-body">

    <div class="auth-container">
        <!-- Logo Header -->
        <a href="index.html" style="text-decoration: none;">
            <div class="auth-logo">
                Flow<span>OPS</span>
            </div>
        </a>

        <!-- Tarjeta de Autenticación -->
        <div class="auth-card" id="authCard">

            <h2 id="authTitle">Iniciar Sesión</h2>
            <p id="authSubtitle">Ingresa a tu cuenta de FlowOPS.</p>

            <form id="authForm" action="dashboard.html" method="GET">

                <div class="input-group" id="nameGroup"
                    style="display: none; opacity: 0; transition: opacity 0.3s ease;">
                    <label for="name">Nombre Completo</label>
                    <input type="text" id="name" name="name" placeholder="Ej. Juan Pérez">
                </div>

                <div class="input-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" name="email" placeholder="tu@correo.com" required>
                </div>

                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="auth-btn" id="submitBtn">Entrar</button>
            </form>

            <div class="auth-toggle">
                <a href="#" id="toggleLink">¿No tienes cuenta? Regístrate aquí</a>
            </div>

        </div>
    </div>

    <!-- Script para cambiar entre UI de Login y Registro con animaciones -->
    <script>
        const toggleLink = document.getElementById('toggleLink');
        const authTitle = document.getElementById('authTitle');
        const authSubtitle = document.getElementById('authSubtitle');
        const authBtn = document.getElementById('submitBtn');
        const nameGroup = document.getElementById('nameGroup');
        const nameInput = document.getElementById('name');
        const authCard = document.getElementById('authCard');

        let isLogin = true;

        toggleLink.addEventListener('click', (e) => {
            e.preventDefault();
            isLogin = !isLogin;

            // Pequeña animación de la tarjeta
            authCard.style.transform = 'scale(0.98)';
            setTimeout(() => {
                authCard.style.transform = 'scale(1)';
            }, 150);

            if (isLogin) {
                // Modo Login
                authTitle.textContent = "Iniciar Sesión";
                authSubtitle.textContent = "Ingresa a tu cuenta de FlowOPS.";
                authBtn.textContent = "Entrar";
                toggleLink.textContent = "¿No tienes cuenta? Regístrate aquí";

                nameGroup.style.opacity = '0';
                setTimeout(() => {
                    nameGroup.style.display = 'none';
                    nameInput.required = false;
                }, 300);
            } else {
                // Modo Registro
                authTitle.textContent = "Crear Cuenta";
                authSubtitle.textContent = "Únete a FlowOPS hoy mismo.";
                authBtn.textContent = "Registrarse";
                toggleLink.textContent = "¿Ya tienes cuenta? Inicia sesión aquí";

                nameGroup.style.display = 'block';
                nameInput.required = true;
                // Pequeño delay para que la transición de opacidad funcione
                setTimeout(() => {
                    nameGroup.style.opacity = '1';
                }, 10);
            }
        });

        // Simulación de carga al enviar el formulario
        document.getElementById('authForm').addEventListener('submit', function (e) {
            e.preventDefault(); // Evitamos el envío real un momento para la animación

            const btn = document.getElementById('submitBtn');
            const originalText = btn.textContent;

            btn.innerHTML = '<span style="display:inline-block; animation: spin 1s linear infinite;">↻</span> Procesando...';
            btn.style.opacity = '0.8';
            btn.disabled = true;

            setTimeout(() => {
                // Redirigir al dashboard real
                window.location.href = 'dashboard.html';
            }, 800);
        });
    </script>

    <style>
        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</body>

</html>
