<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowOPS - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Estilos en línea solo temporales para el placeholder del dashboard */
        .dashboard-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .dashboard-header {
            padding: 20px 8%;
            border-bottom: 1px solid #E4E7EC;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .dashboard-content {
            flex: 1;
            padding: 40px 8%;
            background-color: #F9FAFB;
        }

        .dashboard-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            border: 1px solid #E4E7EC;
            text-align: center;
        }
    </style>
</head>

<body>

    <div class="dashboard-container">
        <header class="dashboard-header">
            <div class="logo">
                Flow<span>OPS</span>
            </div>
            <a href="index.html" class="nav-links" style="color: #697485; text-decoration: none;">Cerrar Sesión</a>
        </header>

        <main class="dashboard-content">
            <div class="dashboard-card">
                <h2>¡Bienvenido al Dashboard! 👋</h2>
                <p style="margin-top: 15px; color: #697485;">Esta es una página de prueba. Aquí irá la interfaz de
                    gestión de tu restaurante.</p>
                <a href="index.html" class="btn-nav"
                    style="display: inline-block; margin-top: 25px; text-decoration: none;">Volver al inicio</a>
            </div>
        </main>
    </div>

</body>

</html>
